name: Daily Morning Briefing

on:
  workflow_dispatch:         # Manual trigger only — add schedule when API key is set up

permissions:
  contents: write

jobs:
  generate-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-briefing.js

      - name: Commit and push briefing
        run: |
          git config user.name "Briefing Bot"
          git config user.email "bot@noreply.github.com"
          git add briefing.json
          git diff --staged --quiet && echo "No changes" || git commit -m "briefing: $(date -u +%Y-%m-%d)"
          git push
