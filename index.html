<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>My Daily Life</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#fff8f0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Daily Life" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #F59E0B;
      --amber:   #F97316;
      --coral:   #FB7185;
      --rose:    #F43F5E;
      --peach:   #FED7AA;
      --blush:   #FECACA;
      --purple:  #C084FC;
      --dusk:    #A855F7;
      --bg:      #FFFFFF;
      --bg2:     #FFF8F0;
      --bg3:     #FFF1E6;
      --text:    #1C1917;
      --text2:   #78716C;
      --text3:   #A8A29E;
      --border:  rgba(249,115,22,0.15);
      --border2: rgba(249,115,22,0.25);
      --radius:  14px;
      --radius-sm: 8px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── SPLASH ─────────────────────────────────── */
    #splash {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(180deg, #fff8f0 0%, #fff1e6 60%, #fde8d0 100%);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; transform: scale(1.04); }

    .sun-wrap {
      position: relative; width: 180px; height: 180px; margin-bottom: 40px;
      animation: rise 1.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    @keyframes rise {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .sun {
      position: absolute; inset: 20px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #FDE68A, #F59E0B 50%, #EA580C);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 40px 10px rgba(245,158,11,0.3), 0 0 80px 20px rgba(251,146,60,0.15); }
      50%      { box-shadow: 0 0 60px 20px rgba(245,158,11,0.45), 0 0 120px 40px rgba(251,146,60,0.2); }
    }

    .rays {
      position: absolute; inset: 0;
      animation: spin-rays 20s linear infinite;
    }
    @keyframes spin-rays { to { transform: rotate(360deg); } }

    .ray {
      position: absolute; left: 50%; top: 50%;
      width: 3px; border-radius: 2px;
      background: linear-gradient(to top, rgba(245,158,11,0.6), transparent);
      transform-origin: bottom center;
    }

    .horizon {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 220px; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(249,115,22,0.4), transparent);
    }

    .splash-title {
      font-size: 32px; font-weight: 300; letter-spacing: 0.04em;
      color: var(--text);
      animation: fade-up 1s 0.4s both;
    }
    .splash-sub {
      font-size: 15px; color: var(--text2); margin-top: 8px;
      animation: fade-up 1s 0.6s both;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .enter-btn {
      margin-top: 48px;
      padding: 14px 40px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #F59E0B, #F97316, #FB7185);
      color: white;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.03em;
      cursor: pointer;
      animation: fade-up 1s 0.9s both;
      box-shadow: 0 8px 32px rgba(249,115,22,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .enter-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(249,115,22,0.45); }
    .enter-btn:active { transform: scale(0.97); }

    /* ── BACKGROUND AFFIRMATIONS ─────────────────── */
    #affirmations-bg {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden; pointer-events: none;
    }
    .aff-word {
      position: absolute;
      font-size: 13px; font-weight: 400;
      color: rgba(249,115,22,0.08);
      white-space: nowrap;
      animation: drift linear infinite;
      font-style: italic;
    }
    @keyframes drift {
      from { transform: translateY(100vh); }
      to   { transform: translateY(-120px); }
    }

    /* ── MAIN APP ────────────────────────────────── */
    #app {
      position: relative; z-index: 1;
      max-width: 680px; margin: 0 auto;
      padding: 0 0 100px;
      opacity: 0; transition: opacity 0.6s ease;
    }
    #app.visible { opacity: 1; }

    /* header */
    .app-header {
      padding: 56px 20px 24px;
      background: linear-gradient(180deg, #fff8f0 0%, rgba(255,248,240,0) 100%);
    }
    .app-date { font-size: 13px; color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; }
    .app-greeting { font-size: 26px; font-weight: 400; color: var(--text); line-height: 1.2; }
    .app-greeting span { background: linear-gradient(90deg, #F59E0B, #F97316, #FB7185); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* progress bar */
    .day-progress { margin: 0 20px 24px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-bottom: 6px; }
    .progress-track { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #F59E0B, #F97316, #FB7185); transition: width 0.5s ease; }

    /* sections */
    .sections { padding: 0 16px; display: flex; flex-direction: column; gap: 14px; }

    .section-card {
      background: var(--bg);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .section-card:hover { box-shadow: 0 4px 24px rgba(249,115,22,0.08); }

    .section-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 18px; cursor: pointer;
      user-select: none;
    }

    .section-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .icon-sport  { background: linear-gradient(135deg, #FDE68A, #F59E0B); color: #92400E; }
    .icon-work   { background: linear-gradient(135deg, #FED7AA, #F97316); color: #7C2D12; }
    .icon-social { background: linear-gradient(135deg, #FECACA, #FB7185); color: #881337; }
    .icon-daily  { background: linear-gradient(135deg, #F5D0FE, #C084FC); color: #581C87; }

    .section-title { flex: 1; font-size: 16px; font-weight: 500; color: var(--text); }
    .section-count { font-size: 12px; color: var(--text3); }
    .section-chevron { font-size: 16px; color: var(--text3); transition: transform 0.25s; }
    .section-card.open .section-chevron { transform: rotate(180deg); }

    .section-body { display: none; padding: 0 18px 14px; }
    .section-card.open .section-body { display: block; }

    .task-list { list-style: none; }
    .task-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0;
      border-bottom: 0.5px solid var(--border);
    }
    .task-item:last-child { border-bottom: none; }

    .task-cb {
      width: 22px; height: 22px; border-radius: 50%;
      border: 1.5px solid var(--border2);
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; background: transparent;
    }
    .task-cb.done {
      background: linear-gradient(135deg, #F59E0B, #F97316);
      border-color: transparent;
    }
    .task-cb.done::after {
      content: ''; width: 5px; height: 9px;
      border: 1.5px solid white; border-top: none; border-left: none;
      transform: rotate(45deg) translateY(-1px); display: block;
    }
    .task-cb.habit { border-color: #C084FC; }
    .task-cb.habit.done { background: linear-gradient(135deg, #C084FC, #A855F7); }

    .task-text { flex: 1; font-size: 15px; color: var(--text); }
    .task-text.done { text-decoration: line-through; color: var(--text3); }
    .daily-badge {
      font-size: 10px; padding: 2px 7px; border-radius: 10px;
      background: #F5D0FE; color: #7E22CE;
    }
    .task-del {
      background: none; border: none; color: var(--text3);
      cursor: pointer; font-size: 16px; opacity: 0; transition: opacity 0.15s;
    }
    .task-item:hover .task-del { opacity: 1; }

    .add-row { display: flex; gap: 8px; margin-top: 10px; }
    .add-row input {
      flex: 1; padding: 9px 12px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      background: var(--bg2); color: var(--text);
      font-size: 14px; outline: none;
      font-family: inherit;
    }
    .add-row input:focus { border-color: #F97316; }
    .add-row input::placeholder { color: var(--text3); }
    .add-row button {
      padding: 9px 14px; border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #F59E0B, #F97316);
      color: white; border: none; font-size: 14px;
      cursor: pointer; white-space: nowrap;
    }

    /* bottom nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-top: 0.5px solid var(--border2);
      display: flex; justify-content: space-around;
      padding: 10px 0 max(10px, env(safe-area-inset-bottom));
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; cursor: pointer;
      font-size: 10px; color: var(--text3);
      padding: 4px 12px; border-radius: 10px;
      transition: color 0.15s;
    }
    .nav-item i { font-size: 22px; }
    .nav-item.active { color: #F97316; }

    /* layers */
    .layer { display: none; }
    .layer.active { display: block; }

    /* motivations / visions / visualisations */
    .content-layer { padding: 20px 16px; }
    .layer-title {
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text3); margin-bottom: 16px;
    }
    .card {
      background: var(--bg2); border: 0.5px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px; margin-bottom: 12px;
    }
    .quote-card {
      border-left: 3px solid #F97316; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      background: var(--bg2); padding: 16px 18px; margin-bottom: 10px;
    }
    .quote-text { font-size: 16px; font-style: italic; color: var(--text); line-height: 1.6; }
    .quote-attr { font-size: 13px; color: var(--text3); margin-top: 6px; }
    .editable-list { list-style: none; }
    .editable-list li {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 10px 0; border-bottom: 0.5px solid var(--border);
    }
    .editable-list li:last-child { border-bottom: none; }
    .list-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
    .list-text { flex: 1; font-size: 15px; color: var(--text); line-height: 1.5; }
    .list-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; opacity: 0; transition: opacity 0.15s; }
    .editable-list li:hover .list-del { opacity: 1; }
    textarea {
      width: 100%; padding: 10px 12px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      background: var(--bg); color: var(--text);
      font-size: 14px; resize: vertical; min-height: 80px;
      font-family: inherit; outline: none;
    }
    textarea:focus { border-color: #F97316; }
    textarea::placeholder { color: var(--text3); }
    .save-btn {
      margin-top: 8px; padding: 9px 18px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #F59E0B, #F97316);
      color: white; border: none; font-size: 14px; cursor: pointer;
    }

    .affirmation-card {
      background: linear-gradient(135deg, #FFF8F0, #FFF1E6);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      padding: 20px; margin-bottom: 12px;
      text-align: center;
    }
    .affirmation-text {
      font-size: 18px; font-weight: 400; color: var(--text);
      line-height: 1.5; font-style: italic;
    }
  </style>
</head>
<body>

<!-- BACKGROUND AFFIRMATIONS -->
<div id="affirmations-bg"></div>

<!-- SPLASH -->
<div id="splash">
  <div class="sun-wrap" id="sun-wrap">
    <div class="rays" id="rays"></div>
    <div class="sun"></div>
    <div class="horizon"></div>
  </div>
  <div class="splash-title">My Daily Life</div>
  <div class="splash-sub">Begin with intention</div>
  <button class="enter-btn" onclick="enterApp()">Begin your day</button>
</div>

<!-- MAIN APP -->
<div id="app">

  <div id="layer-today" class="layer active">
    <div class="app-header">
      <div class="app-date" id="app-date"></div>
      <div class="app-greeting">Good <span id="time-of-day">morning</span>, Eabha</div>
    </div>
    <div class="day-progress">
      <div class="progress-label">
        <span>Today's progress</span>
        <span id="progress-label">0 of 0 done</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="sections">

      <div class="section-card" id="sec-sport">
        <div class="section-header" onclick="toggleSection('sport')">
          <div class="section-icon icon-sport"><i class="ti ti-run" aria-hidden="true"></i></div>
          <span class="section-title">Sport & Training</span>
          <span class="section-count" id="count-sport"></span>
          <i class="ti ti-chevron-down section-chevron" aria-hidden="true"></i>
        </div>
        <div class="section-body">
          <ul class="task-list" id="list-sport"></ul>
          <div class="add-row">
            <input type="text" id="input-sport" placeholder="Add training task…" onkeydown="if(event.key==='Enter')addTask('sport')" />
            <button onclick="addTask('sport')"><i class="ti ti-plus"></i></button>
          </div>
        </div>
      </div>

      <div class="section-card" id="sec-work">
        <div class="section-header" onclick="toggleSection('work')">
          <div class="section-icon icon-work"><i class="ti ti-briefcase" aria-hidden="true"></i></div>
          <span class="section-title">Work</span>
          <span class="section-count" id="count-work"></span>
          <i class="ti ti-chevron-down section-chevron" aria-hidden="true"></i>
        </div>
        <div class="section-body">
          <ul class="task-list" id="list-work"></ul>
          <div class="add-row">
            <input type="text" id="input-work" placeholder="Add work task…" onkeydown="if(event.key==='Enter')addTask('work')" />
            <button onclick="addTask('work')"><i class="ti ti-plus"></i></button>
          </div>
        </div>
      </div>

      <div class="section-card" id="sec-social">
        <div class="section-header" onclick="toggleSection('social')">
          <div class="section-icon icon-social"><i class="ti ti-users" aria-hidden="true"></i></div>
          <span class="section-title">Social</span>
          <span class="section-count" id="count-social"></span>
          <i class="ti ti-chevron-down section-chevron" aria-hidden="true"></i>
        </div>
        <div class="section-body">
          <ul class="task-list" id="list-social"></ul>
          <div class="add-row">
            <input type="text" id="input-social" placeholder="Add social task…" onkeydown="if(event.key==='Enter')addTask('social')" />
            <button onclick="addTask('social')"><i class="ti ti-plus"></i></button>
          </div>
        </div>
      </div>

      <div class="section-card" id="sec-daily">
        <div class="section-header" onclick="toggleSection('daily')">
          <div class="section-icon icon-daily"><i class="ti ti-sun" aria-hidden="true"></i></div>
          <span class="section-title">Daily Tasks</span>
          <span class="section-count" id="count-daily"></span>
          <i class="ti ti-chevron-down section-chevron" aria-hidden="true"></i>
        </div>
        <div class="section-body">
          <ul class="task-list" id="list-daily"></ul>
          <div class="add-row">
            <input type="text" id="input-daily" placeholder="Add daily task…" onkeydown="if(event.key==='Enter')addTask('daily')" />
            <button onclick="addTask('daily')"><i class="ti ti-plus"></i></button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="layer-motivations" class="layer">
    <div class="content-layer">
      <div class="layer-title">Motivations</div>
      <div id="motivations-list"></div>
      <div class="card">
        <textarea id="motivation-input" placeholder="Write something that motivates you…"></textarea>
        <button class="save-btn" onclick="addMotivation()">Save</button>
      </div>
    </div>
  </div>

  <div id="layer-affirmations" class="layer">
    <div class="content-layer">
      <div class="layer-title">Daily Affirmations</div>
      <div id="affirmations-list"></div>
      <div class="card">
        <textarea id="affirmation-input" placeholder="Write an affirmation — e.g. I am strong, focused and full of purpose…"></textarea>
        <button class="save-btn" onclick="addAffirmation()">Save</button>
      </div>
    </div>
  </div>

  <div id="layer-visualisations" class="layer">
    <div class="content-layer">
      <div class="layer-title">Visualisations</div>
      <div id="visualisations-list"></div>
      <div class="card">
        <textarea id="vis-input" placeholder="Describe your ideal future self or life in vivid detail…"></textarea>
        <button class="save-btn" onclick="addVis()">Save</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="showLayer('today',this)"><i class="ti ti-calendar"></i>Today</button>
    <button class="nav-item" onclick="showLayer('motivations',this)"><i class="ti ti-flame"></i>Motivations</button>
    <button class="nav-item" onclick="showLayer('affirmations',this)"><i class="ti ti-heart"></i>Affirmations</button>
    <button class="nav-item" onclick="showLayer('visualisations',this)"><i class="ti ti-sparkles"></i>Vision</button>
  </nav>
</div>

<script>
const KEY = 'daily_life_v4';

const CW_HABITS = [
  { id: 'cw1', text: 'Meditate', section: 'daily' },
  { id: 'cw2', text: 'Work out / Run', section: 'sport' }
];

const DEFAULT = {
  sport:  [],
  work:   [],
  social: [],
  daily:  [],
  cwDone: {},
  lastDay: '',
  motivations: [
    { text: "Every action you take today is a vote for the person you want to become.", attr: "James Clear" }
  ],
  affirmations: [],
  visualisations: []
};

let data = JSON.parse(localStorage.getItem(KEY) || 'null') || JSON.parse(JSON.stringify(DEFAULT));

function save() { localStorage.setItem(KEY, JSON.stringify(data)); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function todayKey() { return new Date().toISOString().slice(0,10); }

function resetIfNewDay() {
  if (data.lastDay !== todayKey()) {
    ['sport','work','social','daily'].forEach(s => {
      data[s] = (data[s]||[]).map(t => ({ ...t, done: false }));
    });
    data.cwDone = {};
    data.lastDay = todayKey();
    save();
  }
}

function enterApp() {
  document.getElementById('splash').classList.add('hidden');
  const app = document.getElementById('app');
  app.style.display = 'block';
  setTimeout(() => app.classList.add('visible'), 50);
  resetIfNewDay();
  renderAll();
  startAffirmationBg();
}

function showLayer(id, btn) {
  document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('layer-' + id).classList.add('active');
  btn.classList.add('active');
}

function toggleSection(id) {
  document.getElementById('sec-' + id).classList.toggle('open');
}

function renderHeader() {
  const d = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('app-date').textContent = `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]}`;
  const h = d.getHours();
  document.getElementById('time-of-day').textContent = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
}

function renderTasks() {
  const sections = ['sport','work','social','daily'];
  let totalDone = 0, totalAll = 0;

  sections.forEach(sec => {
    const list = document.getElementById('list-' + sec);
    list.innerHTML = '';

    const habits = CW_HABITS.filter(h => h.section === sec);
    habits.forEach(habit => {
      const done = !!(data.cwDone && data.cwDone[habit.id]);
      if (done) totalDone++;
      totalAll++;
      const li = document.createElement('li');
      li.className = 'task-item';
      li.innerHTML = `
        <div class="task-cb habit ${done?'done':''}" onclick="toggleCW('${habit.id}')" tabindex="0"></div>
        <span class="task-text ${done?'done':''}">${esc(habit.text)}</span>
        <span class="daily-badge">daily</span>
      `;
      list.appendChild(li);
    });

    (data[sec]||[]).forEach((t, i) => {
      if (t.done) totalDone++;
      totalAll++;
      const li = document.createElement('li');
      li.className = 'task-item';
      li.innerHTML = `
        <div class="task-cb ${t.done?'done':''}" onclick="toggleTask('${sec}',${i})" tabindex="0"></div>
        <span class="task-text ${t.done?'done':''}">${esc(t.text)}</span>
        <button class="task-del" onclick="deleteTask('${sec}',${i})" aria-label="Delete"><i class="ti ti-x"></i></button>
      `;
      list.appendChild(li);
    });

    const count = habits.length + (data[sec]||[]).length;
    const done = habits.filter(h => data.cwDone && data.cwDone[h.id]).length + (data[sec]||[]).filter(t=>t.done).length;
    document.getElementById('count-' + sec).textContent = count ? `${done}/${count}` : '';
  });

  const pct = totalAll ? Math.round(totalDone / totalAll * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${totalDone} of ${totalAll} done`;
}

function toggleCW(id) {
  if (!data.cwDone) data.cwDone = {};
  data.cwDone[id] = !data.cwDone[id];
  save(); renderTasks();
}

function addTask(sec) {
  const inp = document.getElementById('input-' + sec);
  const text = inp.value.trim();
  if (!text) return;
  if (!data[sec]) data[sec] = [];
  data[sec].push({ text, done: false });
  inp.value = '';
  save(); renderTasks();
}

function toggleTask(sec, i) {
  data[sec][i].done = !data[sec][i].done;
  save(); renderTasks();
}

function deleteTask(sec, i) {
  data[sec].splice(i, 1);
  save(); renderTasks();
}

function renderMotivations() {
  const cont = document.getElementById('motivations-list');
  cont.innerHTML = '';
  (data.motivations||[]).forEach((m, i) => {
    const d = document.createElement('div');
    d.className = 'quote-card';
    d.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <p class="quote-text">"${esc(m.text)}"</p>
        <button onclick="deleteMotivation(${i})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;margin-left:10px"><i class="ti ti-x"></i></button>
      </div>
      ${m.attr ? `<p class="quote-attr">— ${esc(m.attr)}</p>` : ''}
    `;
    cont.appendChild(d);
  });
}

function addMotivation() {
  const inp = document.getElementById('motivation-input');
  const text = inp.value.trim();
  if (!text) return;
  if (!data.motivations) data.motivations = [];
  data.motivations.push({ text });
  inp.value = '';
  save(); renderMotivations(); startAffirmationBg();
}

function deleteMotivation(i) { data.motivations.splice(i,1); save(); renderMotivations(); }

function renderAffirmations() {
  const cont = document.getElementById('affirmations-list');
  cont.innerHTML = '';
  (data.affirmations||[]).forEach((a, i) => {
    const d = document.createElement('div');
    d.className = 'affirmation-card';
    d.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <p class="affirmation-text">${esc(a)}</p>
        <button onclick="deleteAffirmation(${i})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;margin-left:10px"><i class="ti ti-x"></i></button>
      </div>
    `;
    cont.appendChild(d);
  });
}

function addAffirmation() {
  const inp = document.getElementById('affirmation-input');
  const text = inp.value.trim();
  if (!text) return;
  if (!data.affirmations) data.affirmations = [];
  data.affirmations.push(text);
  inp.value = '';
  save(); renderAffirmations(); startAffirmationBg();
}

function deleteAffirmation(i) { data.affirmations.splice(i,1); save(); renderAffirmations(); }

function renderVis() {
  const cont = document.getElementById('visualisations-list');
  cont.innerHTML = '';
  (data.visualisations||[]).forEach((v, i) => {
    const d = document.createElement('div');
    d.className = 'card';
    d.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <p style="font-size:15px;color:var(--text);line-height:1.6;flex:1">${esc(v)}</p>
        <button onclick="deleteVis(${i})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;margin-left:10px"><i class="ti ti-x"></i></button>
      </div>
    `;
    cont.appendChild(d);
  });
}

function addVis() {
  const inp = document.getElementById('vis-input');
  const text = inp.value.trim();
  if (!text) return;
  if (!data.visualisations) data.visualisations = [];
  data.visualisations.push(text);
  inp.value = '';
  save(); renderVis();
}

function deleteVis(i) { data.visualisations.splice(i,1); save(); renderVis(); }

function startAffirmationBg() {
  const bg = document.getElementById('affirmations-bg');
  bg.innerHTML = '';
  const words = [
    ...(data.motivations||[]).map(m => m.text.split(' ').slice(0,4).join(' ')),
    ...(data.affirmations||[]).map(a => a.split(' ').slice(0,4).join(' ')),
    'focus', 'strength', 'intention', 'growth', 'presence', 'clarity', 'courage', 'joy'
  ];
  words.forEach((word, i) => {
    const el = document.createElement('div');
    el.className = 'aff-word';
    el.textContent = word;
    const left = 5 + (i * 17) % 85;
    const delay = (i * 3.7) % 25;
    const duration = 18 + (i * 2.3) % 14;
    el.style.cssText = `left:${left}%;animation-duration:${duration}s;animation-delay:-${delay}s;`;
    bg.appendChild(el);
  });
}

function renderAll() {
  renderHeader();
  renderTasks();
  renderMotivations();
  renderAffirmations();
  renderVis();
}

function buildSunRays() {
  const rays = document.getElementById('rays');
  for (let i = 0; i < 12; i++) {
    const ray = document.createElement('div');
    ray.className = 'ray';
    const angle = i * 30;
    const len = 30 + (i % 3) * 12;
    ray.style.cssText = `height:${len}px;transform:rotate(${angle}deg) translateX(-50%);margin-left:50%;margin-top:calc(50% - ${len}px);`;
    rays.appendChild(ray);
  }
}

buildSunRays();
startAffirmationBg();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
